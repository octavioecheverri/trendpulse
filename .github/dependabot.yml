version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      types:
        patterns:
          - "@types/*"
      next:
        patterns:
          - next
          - eslint-config-next
      supabase:
        patterns:
          - "@supabase/*"
          - supabase

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
