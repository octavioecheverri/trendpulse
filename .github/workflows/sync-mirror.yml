name: sync-mirror

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  mirror:
    name: Mirror to personal repo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Push to mirror
        env:
          MIRROR_PAT: ${{ secrets.MIRROR_PAT }}
        run: |
          git config --unset-all http.https://github.com/.extraheader || true
          git remote add mirror "https://x-access-token:${MIRROR_PAT}@github.com/octavioecheverri/trendpulse.git"
          git push mirror HEAD:main --force
