name: test-deploy

on:
  workflow_run:
    workflows: [deploy]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      url:
        description: Base URL to test
        required: true
        default: https://trendpul.se

jobs:
  smoke-e2e:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    name: Smoke e2e (Playwright)
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - name: Run smoke tests
        run: pnpm test:e2e:smoke
        env:
          BASE_URL: ${{ github.event.inputs.url || 'https://trendpul.se' }}
          E2E_TEST_USER_EMAIL: ${{ secrets.E2E_TEST_USER_EMAIL }}
          E2E_TEST_USER_PASSWORD: ${{ secrets.E2E_TEST_USER_PASSWORD }}
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  lighthouse:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    name: Lighthouse audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli
      - name: Run Lighthouse
        run: |
          lhci collect --url=${{ github.event.inputs.url || 'https://trendpul.se' }}
          lhci assert --preset=lighthouse:recommended || true

  rollback-on-fail:
    needs: [smoke-e2e, lighthouse]
    if: failure() && github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Install Vercel CLI
        run: npm install -g vercel@latest
      - name: Rollback last production deploy
        run: vercel rollback --yes --token=$VERCEL_TOKEN
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      - name: Notify failure
        run: echo "::error::Production smoke test failed — auto-rolled back"
